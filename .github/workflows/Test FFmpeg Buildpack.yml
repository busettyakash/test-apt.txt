name: Test FFmpeg

on:
  workflow_dispatch:

jobs:
  test-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pack CLI
        run: |
          curl -sSL https://github.com/buildpacks/pack/releases/download/v0.33.0/pack-v0.33.0-linux.tgz | tar -xz
          sudo mv pack /usr/local/bin/
          pack --version

      - name: Check Aptfile
        run: |
          echo "--- Aptfile contents ---"
          cat Aptfile

      - name: Build test image with buildpacks
        run: |
          pack build test-ffmpeg \
            --builder paketobuildpacks/builder-jammy-base:latest \
            --buildpack paketo-buildpacks/apt \
            --path .

      - name: Check ffmpeg install status
        run: |
          # ── Check binary exists in buildpack layer ──
          if docker run --rm --entrypoint bash test-ffmpeg -c \
            "test -f /layers/paketo-buildpacks_apt/apt/usr/bin/ffmpeg"; then
            INSTALLED="✅ YES"
            STATUS="✅ PASSED"
            FFMPEG_PATH="/layers/paketo-buildpacks_apt/apt/usr/bin/ffmpeg"

            # ── Get size in MB ──
            FFMPEG_SIZE=$(docker run --rm --entrypoint bash test-ffmpeg -c \
              "du -sh /layers/paketo-buildpacks_apt/apt/usr/bin/ffmpeg | cut -f1")
            FFMPEG_SIZE_MB=$(docker run --rm --entrypoint bash test-ffmpeg -c \
              "du -sm /layers/paketo-buildpacks_apt/apt/usr/bin/ffmpeg | cut -f1")
          else
            INSTALLED="❌ NO"
            STATUS="❌ FAILED"
            FFMPEG_PATH="NOT FOUND"
            FFMPEG_SIZE="N/A"
            FFMPEG_SIZE_MB="N/A"
          fi

          # ── GitHub Job Summary ──
          echo "# 🐳 FFmpeg Build Status Report"                               >> $GITHUB_STEP_SUMMARY
          echo ""                                                                >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status: ${STATUS}**"                                  >> $GITHUB_STEP_SUMMARY
          echo ""                                                                >> $GITHUB_STEP_SUMMARY
          echo "## 📦 FFmpeg Installation"                                      >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                                              >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"                                              >> $GITHUB_STEP_SUMMARY
          echo "| Installed | ${INSTALLED} |"                                  >> $GITHUB_STEP_SUMMARY
          echo "| Path | \`${FFMPEG_PATH}\` |"                                 >> $GITHUB_STEP_SUMMARY
          echo "| Binary Size | \`${FFMPEG_SIZE} (${FFMPEG_SIZE_MB} MB)\` |"  >> $GITHUB_STEP_SUMMARY
          echo ""                                                                >> $GITHUB_STEP_SUMMARY
          echo "## ⚙️ Build Configuration"                                     >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                                              >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"                                              >> $GITHUB_STEP_SUMMARY
          echo "| Builder | \`paketobuildpacks/builder-jammy-base:latest\` |"  >> $GITHUB_STEP_SUMMARY
          echo "| Apt Buildpack | \`paketo-buildpacks/apt\` ✅ |"              >> $GITHUB_STEP_SUMMARY
          echo "| Aptfile | \`ffmpeg\` |"                                       >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | #${{ github.run_number }} |"                        >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"                            >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |"                       >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date '+%Y-%m-%d %H:%M:%S UTC') |"                  >> $GITHUB_STEP_SUMMARY

          # ── Print to logs ──
          echo "============================================"
          echo "FFmpeg Installed : $INSTALLED"
          echo "FFmpeg Path      : $FFMPEG_PATH"
          echo "FFmpeg Size      : ${FFMPEG_SIZE} (${FFMPEG_SIZE_MB} MB)"
          echo "Overall Status   : $STATUS"
          echo "============================================"

          # ── Fail job if ffmpeg not found ──
          if [[ "$STATUS" == *"FAILED"* ]]; then
            echo "❌ ffmpeg not found — failing job"
            exit 1
          fi

          echo "✅ ffmpeg is installed and ready!"
