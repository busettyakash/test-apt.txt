name: Test FFmpeg

on:
  workflow_dispatch:

jobs:
  test-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pack CLI
        run: |
          curl -sSL https://github.com/buildpacks/pack/releases/download/v0.33.0/pack-v0.33.0-linux.tgz | tar -xz
          sudo mv pack /usr/local/bin/
          pack --version

      - name: Check Aptfile
        run: |
          echo "--- Aptfile contents ---"
          cat Aptfile

      - name: Build test image with buildpacks
        run: |
          pack build test-ffmpeg \
            --builder paketobuildpacks/builder-jammy-base:latest \
            --buildpack paketo-buildpacks/apt \
            --path .

      - name: Run check_ffmpeg.py inside container
        run: |
          echo "Running check_ffmpeg.py..."

          # Find launcher full path inside the image
          LAUNCHER=$(docker run --rm --entrypoint bash test-ffmpeg -c \
            "find / -name launcher -type f 2>/dev/null | head -1")
          echo "Launcher path: $LAUNCHER"

          # Run check_ffmpeg.py via launcher (same env as voice.py)
          CHECK_OUTPUT=$(docker run --rm --entrypoint bash test-ffmpeg -c \
            "$LAUNCHER bash -c 'python check_ffmpeg.py'" || echo "SCRIPT FAILED")

          echo "$CHECK_OUTPUT"

          # ── ffmpeg version ──
          FFMPEG_VERSION=$(docker run --rm --entrypoint bash test-ffmpeg -c \
            "$LAUNCHER bash -c 'ffmpeg -version 2>&1 | head -1'" || echo "NOT FOUND")

          # ── which ffmpeg (PATH check) ──
          FFMPEG_PATH=$(docker run --rm --entrypoint bash test-ffmpeg -c \
            "$LAUNCHER bash -c 'which ffmpeg 2>/dev/null || echo NOT FOUND'")

          # ── PATH dirs check ──
          PATH_DIRS=$(docker run --rm --entrypoint bash test-ffmpeg -c \
            "$LAUNCHER bash -c 'echo \$PATH'")

          # ── WebM → WAV conversion (same as _do_stt() in voice.py) ──
          CONVERSION_RESULT=$(docker run --rm --entrypoint bash test-ffmpeg -c "
            $LAUNCHER bash -c '
              ffmpeg -f lavfi -i sine=frequency=1000:duration=1 /tmp/test.webm -y 2>/dev/null && \
              ffmpeg -y -i /tmp/test.webm -ar 16000 -ac 1 /tmp/test.wav 2>/dev/null && \
              echo SUCCESS || echo FAILED
            '
          ")

          echo "FFmpeg Version : $FFMPEG_VERSION"
          echo "FFmpeg Path    : $FFMPEG_PATH"
          echo "PATH dirs      : $PATH_DIRS"
          echo "Conversion     : $CONVERSION_RESULT"
          echo "Launcher       : $LAUNCHER"

          # ── Status flags ──
          if [[ "$FFMPEG_VERSION" == *"ffmpeg version"* ]]; then
            STATUS="✅ PASSED"
            INSTALLED="✅ YES"
          else
            STATUS="❌ FAILED"
            INSTALLED="❌ NO"
          fi

          if [[ "$CONVERSION_RESULT" == *"SUCCESS"* ]]; then
            CONV="✅ SUCCESS"
          else
            CONV="❌ FAILED"
          fi

          # ── GitHub Job Summary ──
          echo "# 🐳 FFmpeg Buildpack Test Report"                              >> $GITHUB_STEP_SUMMARY
          echo ""                                                                >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status: ${STATUS}**"                                  >> $GITHUB_STEP_SUMMARY
          echo ""                                                                >> $GITHUB_STEP_SUMMARY
          echo "## 📦 FFmpeg Installation (via check_ffmpeg.py)"               >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                                              >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"                                              >> $GITHUB_STEP_SUMMARY
          echo "| Installed | ${INSTALLED} |"                                  >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${FFMPEG_VERSION}\` |"                           >> $GITHUB_STEP_SUMMARY
          echo "| Path | \`${FFMPEG_PATH}\` |"                                 >> $GITHUB_STEP_SUMMARY
          echo "| Launcher | \`${LAUNCHER}\` |"                                >> $GITHUB_STEP_SUMMARY
          echo ""                                                                >> $GITHUB_STEP_SUMMARY
          echo "## 🔍 PATH Check"                                               >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                                              >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"                                              >> $GITHUB_STEP_SUMMARY
          echo "| PATH dirs | \`${PATH_DIRS}\` |"                              >> $GITHUB_STEP_SUMMARY
          echo "| which ffmpeg | \`${FFMPEG_PATH}\` |"                         >> $GITHUB_STEP_SUMMARY
          echo ""                                                                >> $GITHUB_STEP_SUMMARY
          echo "## 🎵 WebM → WAV Conversion (_do_stt() in voice.py)"          >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                                              >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"                                              >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${CONV} |"                                          >> $GITHUB_STEP_SUMMARY
          echo "| Command | \`ffmpeg -y -i test.webm -ar 16000 -ac 1 test.wav\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Used By | \`voice.py → _do_stt()\` |"                       >> $GITHUB_STEP_SUMMARY
          echo ""                                                                >> $GITHUB_STEP_SUMMARY
          echo "## ⚙️ Build Configuration"                                     >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                                              >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"                                              >> $GITHUB_STEP_SUMMARY
          echo "| Builder | \`paketobuildpacks/builder-jammy-base\` |"         >> $GITHUB_STEP_SUMMARY
          echo "| Apt Buildpack | \`paketo-buildpacks/apt\` ✅ |"              >> $GITHUB_STEP_SUMMARY
          echo "| Aptfile | \`ffmpeg\` |"                                       >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | #${{ github.run_number }} |"                        >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |"                            >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |"                       >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date '+%Y-%m-%d %H:%M:%S UTC') |"                  >> $GITHUB_STEP_SUMMARY

          # ── Print to logs ──
          echo "============================================"
          echo "Launcher         : $LAUNCHER"
          echo "FFmpeg Installed : $INSTALLED"
          echo "FFmpeg Version   : $FFMPEG_VERSION"
          echo "FFmpeg Path      : $FFMPEG_PATH"
          echo "PATH dirs        : $PATH_DIRS"
          echo "Conversion       : $CONV"
          echo "Overall Status   : $STATUS"
          echo "============================================"

          # ── Fail job if ffmpeg not found ──
          if [[ "$FFMPEG_VERSION" != *"ffmpeg version"* ]]; then
            echo "❌ ffmpeg not found — failing job"
            exit 1
          fi

          echo "✅ All tests passed!"
