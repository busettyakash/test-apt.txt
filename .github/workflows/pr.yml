name: Secure Secret Management Pipeline (Key Vault + YAML + PR)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - qa

      secrets_input:
        description: "Enter secrets (KEY=VALUE, one per line)"
        required: true

jobs:
  add-secrets:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      # ----------------------------------------
      # 1. Checkout
      # ----------------------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # ----------------------------------------
      # 2. Set Variables
      # ----------------------------------------
      - name: Set variables
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "ENV=$ENV" >> $GITHUB_ENV

          if [ "$ENV" == "dev" ]; then
            echo "KV_NAME=your-dev-keyvault" >> $GITHUB_ENV
          else
            echo "KV_NAME=your-qa-keyvault" >> $GITHUB_ENV
          fi

          echo "FILE=installations/secrets/secret-provider-class-app-secrets-$ENV.yml" >> $GITHUB_ENV

      # ----------------------------------------
      # 3. Azure Login (OIDC)
      # ----------------------------------------
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ----------------------------------------
      # 4. Install yq
      # ----------------------------------------
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      # ----------------------------------------
      # 5. Validate Input
      # ----------------------------------------
      - name: Validate secrets input
        run: |
          echo "${{ github.event.inputs.secrets_input }}" > secrets.txt

          while IFS= read -r line
          do
            if [[ "$line" != *=* ]]; then
              echo "❌ Invalid format detected"
              exit 1
            fi
          done < secrets.txt

      # ----------------------------------------
      # 6. Process Secrets (SECURE)
      # ----------------------------------------
      - name: Process secrets securely
        run: |
          while IFS= read -r line
          do
            KEY=$(echo "$line" | cut -d '=' -f1 | xargs)
            VALUE=$(echo "$line" | cut -d '=' -f2- | xargs)
            OBJECT_NAME=$(echo "$KEY" | tr '_' '-')

            # Mask secret value
            echo "::add-mask::$VALUE"

            echo "Processing secret..."

            # Add to Key Vault (silent)
            az keyvault secret set \
              --vault-name $KV_NAME \
              --name "$OBJECT_NAME" \
              --value "$VALUE" \
              --output none

            # ----------------------------------------
            # 1. Update objects section FIRST (- |)
            # ----------------------------------------
            CURRENT=$(yq e '.spec.parameters.objects' $FILE)

            NEW_ENTRY="\n        - |\n          objectName: $OBJECT_NAME\n          objectType: secret"

            yq e ".spec.parameters.objects = \"$CURRENT$NEW_ENTRY\"" -i $FILE

            # ----------------------------------------
            # 2. Update secretObjects NEXT (- key)
            # ----------------------------------------
            yq e '.spec.secretObjects[0].data += [{"key": "'"$KEY"'", "objectName": "'"$OBJECT_NAME"'"}]' -i $FILE

          done < secrets.txt

      # ----------------------------------------
      # 7. Commit Changes
      # ----------------------------------------
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b add-secrets-${{ github.run_id }}

          git add $FILE
          git commit -m "Add secrets for $ENV"

      # ----------------------------------------
      # 8. Create PR
      # ----------------------------------------
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: add-secrets-${{ github.run_id }}
          title: "Add secrets (${{ env.ENV }})"
          body: "Securely added secrets to Key Vault and updated YAML"
