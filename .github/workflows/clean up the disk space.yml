name: clean up the disk space
on:
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h

          # Remove unused tools
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOL_CACHE" /usr/local/lib/android /usr/share/swift /usr/local/.ghcup /opt/hostedtoolcache/CodeQL

          # Remove unused packages
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri --fix-missing || true
          sudo apt-get autoremove -y && sudo apt-get clean

          # Clean Docker
          sudo docker system prune -af --volumes

          # Clean /tmp buildpack leftover files
          sudo rm -rf /tmp/lifecycle* /tmp/pack-* /tmp/buildpack* || true

          # Redirect /tmp to main disk (45GB) instead of tmpfs (7.9GB)
          sudo mkdir -p /mnt/tmp
          sudo mount --bind /mnt/tmp /tmp
          sudo chmod 1777 /tmp

          echo "Disk space after cleanup:"
          df -h
