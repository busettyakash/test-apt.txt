name: Test Buildpacks

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pack CLI
        run: |
          curl -sSL https://github.com/buildpacks/pack/releases/download/v0.33.0/pack-v0.33.0-linux.tgz | tar -xz
          sudo mv pack /usr/local/bin/

      - name: Verify pack
        run: pack --version

      - name: Build container using buildpacks
        run: |
          pack build test-ffmpeg \
            --builder paketobuildpacks/builder-jammy-base \
            --buildpack paketo-buildpacks/apt \
            --path ./test-build

      - name: Check FFmpeg
        run: |
          FFMPEG_PATH=$(docker run --rm --entrypoint bash test-ffmpeg -c "which ffmpeg")
          FFMPEG_VERSION=$(docker run --rm --entrypoint bash test-ffmpeg -c "ffmpeg -version 2>&1")

          echo "FFmpeg Path: $FFMPEG_PATH"
          echo "Version: $FFMPEG_VERSION"

          export FFMPEG_PATH_VAR="$FFMPEG_PATH"
          export FFMPEG_VERSION_VAR="$FFMPEG_VERSION"
          export BUILD_DATE_VAR="$(date)"

          mkdir -p docs
          touch docs/.nojekyll

          python3 generate_report.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
